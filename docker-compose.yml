services:
  postgres-db:
    image: postgres:17.7
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_NAME} 
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432
  auth-redis:
    image: redis:7.2 
    restart: always
    volumes:
      - redis_data:/data 
    command: redis-server --appendonly yes 
    ports:
      - "6379:6379"

volumes:
  redis_data: 